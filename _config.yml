# Built with Jekyll 3.6.0

# Setup
title:               Las moriscas de Daimiel
tagline:             'Edición digital'
description:         '"Transcribing Moriscas on Trial" has multi-year ambitions to create digital tools and publish OERs that advance teaching and scholarship on the morisco experience while equipping undergraduates with the paleographic skills and digital competencies to engage rigorously with these important documents.'
url:                 'https://nikoisai.github.io/'
baseurl:             '/moriscas_trial_of_mayor_garcia'

# About/contact
author:
  name:              Alex Gil
  url:               https://twitter.com/elotroalex
  email:             colibri.alex@gmail.com

# Color scheme. Options: red, orange, magenta, cyan, blue, brown
color-scheme:

# Permalinks
permalink: pretty
permalink: /:title/

# Set encoding to UTF-8
encoding: utf-8

# Collections for texts
collections:
  texts:
  #set to false because there is no need for each text to have its own page
    output: false

# Collections for images (added by Niko)
#  images:
#    output: true

# Markdown specs
markdown: kramdown

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  footnote_backlink: "&#x21a9;&#xfe0e;"
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Exclusions from the final site
exclude:
  - optional
  - vendor
  - ed..gemspec
  - Gemfile
  - Gemfile.lock
  - backstop_data
  - backstop.json

# Theme
# (Used for local or custom-server deployments)
# Uncomment the `theme` line if using the Ed. theme gem on your own computer or server.
# See https://jekyllrb.com/docs/themes/
# theme: "ed."

# Remote Theme
# (Used only for GitHub deployments)
# See https://help.github.com/en/articles/adding-a-jekyll-theme-to-your-github-pages-site
remote_theme: minicomp/ed
