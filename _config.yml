# Built with Jekyll 3.6.0

# Setup
title:               Los moriscos de Daimiel
tagline:             'Edición digital'
#description:         '"Los moriscos de Daimiel" tiene ambiciones plurianuales de crear herramientas digitales y de publicar OERs que avanzan la enseñanza y trabajos académicos sobre la experiencia morisca mientras equipan a estudiantes universitarios con habilidades paleográficas y competencias digitales para involucrarse rigurosamente en estos documentos importantes.'
url:                 'https://digbmc.github.io/'
baseurl:             '/moriscos-daimel'

# About/contact
#author:
#  name:              Alex Gil
#  url:               https://twitter.com/elotroalex
#  email:             colibri.alex@gmail.com

# Color scheme. Options: red, orange, magenta, cyan, blue, brown
color-scheme:

# Permalinks
permalink: pretty
permalink: /:title/

# Set encoding to UTF-8
encoding: utf-8

# Collections for texts
collections:
  texts:
  #set to back to true to create individual pages are avoid JavaScript issues
    output: true
  textos-modernos:
    output: true

# Collections for images (added by Niko)
#  images:
#    output: true

# Markdown specs
markdown: kramdown

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  footnote_backlink: "&#x21a9;&#xfe0e;"
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Exclusions from the final site
exclude:
  - optional
  - vendor
  - ed..gemspec
  - Gemfile
  - Gemfile.lock
  - backstop_data
  - backstop.json

# Theme
# (Used for local or custom-server deployments)
# Uncomment the `theme` line if using the Ed. theme gem on your own computer or server.
# See https://jekyllrb.com/docs/themes/
# theme: "ed."

# Remote Theme
# (Used only for GitHub deployments)
# See https://help.github.com/en/articles/adding-a-jekyll-theme-to-your-github-pages-site
remote_theme: minicomp/ed
