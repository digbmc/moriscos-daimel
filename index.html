<select class="jump_pg" id="jump_pg">
  <option value="">Jump to Page</option>
  {% for item in site.texts %}
  <option value= "{{ site.baseurl }}{{ item.url }}">
    {{ item.title }}
  </option>
  {% endfor %}
</select>
<input type="button" value="Submit" onclick="goToPage()">

<script>
  function goToPage() {
    const select = document.getElementById("jump_pg");
    const url = select.value;

    if (url) {
      window.location.href = url;
    }
  }
</script>
