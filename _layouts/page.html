layout: default
---

<article class="page">
  <!-- Replacing this so as to have more freedom with title placement
  <h1 class="page-title">{{ page.title }}</h1>
-->
  {% unless page.hide_title %}
    <h1>{{ page.title }}</h1>
    {% endunless %}
    {{ content }}
</article>
